name: PR Health Check

on:
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run TypeScript compiler
        run: npx tsc --project packages/view/tsconfig.app.json --noEmit

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint all packages
        run: npx nx run-many --target=lint --all

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build view
        run: npx nx run @portfolio/view:build

  version-check:
    name: Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Fetch main branch for comparison
        run: git fetch origin main

      - name: Check version consistency
        run: node scripts/check-versions.js
        env:
          BASE_BRANCH: origin/main

  # Single job that branch protection can require — passes only when all jobs above pass
  healthcheck:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [typecheck, lint, build, version-check]
    if: always()
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [[ "${{ needs.typecheck.result }}" != "success" ||
                "${{ needs.lint.result }}"      != "success" ||
                "${{ needs.build.result }}"     != "success" ||
                "${{ needs.version-check.result }}" != "success" ]]; then
            echo "One or more health checks failed."
            exit 1
          fi
          echo "All health checks passed."
